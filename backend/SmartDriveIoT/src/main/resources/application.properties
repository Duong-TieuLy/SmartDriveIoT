spring.application.name=SmartDriveIoT

# Database - Tự động lấy cấu hình từ môi trường, nếu không có sẽ dùng localhost làm mặc định
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_drive_iot?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Cổng khởi chạy (Railway sẽ tự động ghi đè biến ${PORT})
server.port=${PORT:8080}